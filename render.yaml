services:
  - type: web
    name: couture-document-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Couture Document API
      - key: DEBUG
        value: false
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: BACKEND_CORS_ORIGIN_REGEX
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 180
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_FIRST_NAME
        sync: false
      - key: DEFAULT_ADMIN_LAST_NAME
        sync: false
      - key: MEDIA_STORAGE_DIR
        value: media/uploads
      - key: MEDIA_BASE_URL
        value: /media/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: 5
      - key: ALLOWED_IMAGE_EXTENSIONS
        value: '[".jpg",".jpeg",".png",".webp"]'
